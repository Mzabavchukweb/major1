<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image — Major1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Manrope', sans-serif;
    background: #08080c;
    color: #fff;
    position: relative;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(255,201,49,0.03) 1px, transparent 1px),
      linear-gradient(180deg, rgba(255,201,49,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Gradient glow top-left */
  body::after {
    content: '';
    position: absolute;
    top: -120px;
    left: -120px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,201,49,0.12) 0%, transparent 70%);
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
  }

  /* Accent line left */
  .accent-line {
    position: absolute;
    left: 0;
    top: 80px;
    bottom: 80px;
    width: 4px;
    background: linear-gradient(180deg, #FFC931, #e6a800);
    border-radius: 2px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .logo-row img {
    width: 72px;
    height: 72px;
    object-fit: contain;
  }

  .logo-row .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: #fff;
  }

  .logo-row .divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    margin: 0 8px;
  }

  .logo-row .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 86px;
    line-height: 0.95;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 28px;
  }

  h1 .accent {
    color: #FFC931;
  }

  .lead {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    line-height: 1.5;
    color: rgba(255,255,255,0.55);
    max-width: 680px;
    font-weight: 400;
  }

  .stats-row {
    display: flex;
    gap: 48px;
    margin-top: 44px;
    padding-top: 32px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .stat .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: #FFC931;
    line-height: 1;
  }

  .stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #FFC931, #e6a800, transparent);
  }
</style>
</head>
<body>

  <div class="card">
    <div class="accent-line"></div>

    <div class="logo-row">
      <img src="images/logo-major1.svg" alt="Major1">
      <span class="brand">MAJOR1</span>
      <span class="divider"></span>
      <span class="sub">Agencja Ochrony</span>
    </div>

    <h1>
      BEZPIECZEŃSTWO<br>
      NA NAJWYŻSZYM<br>
      <span class="accent">POZIOMIE.</span>
    </h1>

    <p class="lead">
      Profesjonalna ochrona fizyczna, VIP i systemy zabezpieczeń. Poznań&nbsp;·&nbsp;od&nbsp;2011.
    </p>

    <div class="stats-row">
      <div class="stat">
        <div class="num">14+</div>
        <div class="label">Lat doświadczenia</div>
      </div>
      <div class="stat">
        <div class="num">130+</div>
        <div class="label">Zaufanych klientów</div>
      </div>
      <div class="stat">
        <div class="num">24/7</div>
        <div class="label">Pełna gotowość</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>

</body>
</html>
